name: Verify live GitHub Pages site

on:
  workflow_run:
    workflows: ["Verify and deploy GitHub Pages"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: live-pages-audit
  cancel-in-progress: true

jobs:
  verify-live-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ignore superseded deployment runs
        id: gate
        shell: bash
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          current_sha=$(git rev-parse HEAD)
          if [[ "$DEPLOY_SHA" == "$current_sha" ]]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify the deployed game URL
        if: steps.gate.outputs.current == 'true'
        shell: bash
        env:
          DEPLOY_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set +e
          url="https://dh73.github.io/MMMMmmmmmmmaincra/"
          verified=false
          response=""
          if [[ "$DEPLOY_CONCLUSION" == "success" ]]; then
            for attempt in $(seq 1 18); do
              response=$(curl --location --fail --silent --show-error --max-time 20 "$url" 2>/tmp/pages-curl-error)
              if [[ $? -eq 0 ]] && grep -q "Canto de Barro" <<<"$response" && grep -q './src/game.js' <<<"$response"; then
                verified=true
                break
              fi
              sleep 5
            done
          fi
          {
            echo "# GitHub Pages deployment audit"
            echo
            echo "- URL: $url"
            echo "- Workflow conclusion: $DEPLOY_CONCLUSION"
            echo "- Deployed commit: $DEPLOY_SHA"
            echo "- Native game entrypoint verified: $verified"
          } > PAGES_DEPLOYMENT.md
          if [[ "$verified" != "true" ]]; then
            echo >> PAGES_DEPLOYMENT.md
            echo 'The deployment or live HTTP verification failed. Inspect the Pages workflow run and repository Pages plan/settings.' >> PAGES_DEPLOYMENT.md
            cat /tmp/pages-curl-error >> PAGES_DEPLOYMENT.md 2>/dev/null || true
          fi

      - name: Record audit and remove this one-use workflow
        if: steps.gate.outputs.current == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/verify-live-pages.yml
          git add PAGES_DEPLOYMENT.md
          git commit -m "Record GitHub Pages deployment audit"
          git push origin HEAD:main
